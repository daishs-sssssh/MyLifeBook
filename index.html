<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя Книга Жизни | Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --main: #800000; --gold: #d4af37; }
        body { font-family: 'Lora', serif; background: #4a0000; color: white; margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        .container { background: white; color: #333; padding: 30px; border-radius: 20px; width: 100%; max-width: 450px; border: 2px solid var(--gold); text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { font-family: 'Playfair Display', serif; color: var(--main); }
        input, textarea { width: 100%; padding: 12px; margin-top: 10px; border: 1px solid #ccc; border-radius: 10px; font-family: inherit; font-size: 16px; box-sizing: border-box; }
        .btn { background: linear-gradient(45deg, var(--main), #b30000); color: white; padding: 15px; border: none; width: 100%; border-radius: 50px; margin-top: 20px; cursor: pointer; font-size: 18px; font-weight: bold; }
        .hidden { display: none; }
        .theme-btn { background: #fdf2f2; border: 1px solid var(--main); padding: 15px; border-radius: 10px; cursor: pointer; color: var(--main); font-weight: bold; margin-top: 10px; display: block; width: 100%; }
        #image-previews { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-top: 10px; }
        .preview-img { width: 100%; height: 50px; object-fit: cover; border-radius: 5px; border: 1px solid var(--gold); }
    </style>
</head>
<body>

<div class="container">
    <div id="password-section">
        <h2>Вход</h2>
        <input type="password" id="passInput" placeholder="Введите ваш личный пароль">
        <button class="btn" onclick="checkPassword()">Войти</button>
    </div>

    <div id="theme-section" class="hidden">
        <h2>Выберите тему книги</h2>
        <div class="theme-btn" onclick="selectTheme('мама')">Книга о Маме ❤️</div>
        <div class="theme-btn" onclick="selectTheme('папа')">Книга о Папе 👔</div>
        <div class="theme-btn" onclick="selectTheme('любовь')">История нашей любви 💍</div>
    </div>

    <div id="cover-section" class="hidden">
        <h2>Обложка и Авторы</h2>
        <p>Выберите до 10 фото для обложки:</p>
        <input type="file" id="coverImages" accept="image/*" multiple onchange="previewImages()">
        <div id="image-previews"></div>
        <textarea id="authorsInput" placeholder="Кто авторы книги? (например: Твои дети)"></textarea>
        <button class="btn" onclick="startQuestions()">Начать интервью ➡️</button>
    </div>

    <div id="quiz-section" class="hidden">
        <div style="color:var(--gold);" id="progressText">Вопрос 1</div>
        <h2 id="questionText">...</h2>
        <textarea id="answerInput" placeholder="Ваш ответ..."></textarea>
        <div id="qImageArea" class="hidden">
            <p>📸 Фото к этому вопросу:</p>
            <input type="file" id="qImage" accept="image/*">
        </div>
        <button class="btn" onclick="nextQuestion()">Далее ➡️</button>
    </div>

    <div id="final-section" class="hidden">
        <h2>Поздравляем! 🎉</h2>
        <p>Все ответы записаны. Нажмите кнопку ниже, чтобы отправить их нам для оформления книги.</p>
        <button class="btn" id="sendBtn" onclick="sendToTelegram()">Отправить данные 🚀</button>
    </div>
</div>

<script>
    const BOT_TOKEN = "8604545122:AAEx9ZLtB8Cwl1Juj7ue15ktZoB1UtrpBDQ";
    const CHAT_ID = "5420064941";

    let selectedTheme = "";
    let currentStep = 0;
    let answers = [];
    let coverFiles = [];

    const questionsMap = {
        "мама": [
            {q: "Полное ФИО вашей мамы?", img: false},
            {q: "Ее дата и место рождения?", img: false},
            {q: "Загрузите самое красивое фото мамы", img: true},
            {q: "Какое ее самое любимое блюдо, которое она готовит?", img: false},
            {q: "О чем она мечтала в детстве?", img: false},
            {q: "Загрузите фото мамы с вами", img: true},
            {q: "Какой главный совет она вам дала в жизни?", img: false},
            {q: "Опишите маму тремя словами", img: false},
            {q: "Фото из ее молодости", img: true},
            {q: "Что вы хотите сказать ей прямо сейчас?", img: false}
            // Сюда можно добавить еще 190 вопросов
        ],
        "папа": [
            {q: "ФИО вашего отца?", img: false},
            {q: "Фото отца", img: true},
            {q: "Какую профессию он выбрал и почему?", img: false},
            {q: "Ваше самое яркое воспоминание с папой?", img: false}
        ],
        "любовь": [
            {q: "Как вы познакомились?", img: false},
            {q: "Фото вашего первого свидания", img: true},
            {q: "Когда вы поняли, что это любовь?", img: false}
        ]
    };

    function checkPassword() {
        if(document.getElementById('passInput').value === "1234") showSection('theme-section');
        else alert("Неверный пароль!");
    }

    function selectTheme(theme) {
        selectedTheme = theme;
        showSection('cover-section');
    }

    function previewImages() {
        const preview = document.getElementById('image-previews');
        preview.innerHTML = "";
        coverFiles = Array.from(document.getElementById('coverImages').files).slice(0, 10);
        coverFiles.forEach(file => {
            const img = document.createElement('img');
            img.src = URL.createObjectURL(file);
            img.className = 'preview-img';
            preview.appendChild(img);
        });
    }

    function startQuestions() {
        showSection('quiz-section');
        updateQuestion();
    }

    function updateQuestion() {
        const qList = questionsMap[selectedTheme];
        const q = qList[currentStep];
        document.getElementById('progressText').innerText = `Вопрос ${currentStep + 1} из ${qList.length}`;
        document.getElementById('questionText').innerText = q.q;
        document.getElementById('qImageArea').className = q.img ? "" : "hidden";
    }

    function nextQuestion() {
        const qList = questionsMap[selectedTheme];
        answers.push({
            q: qList[currentStep].q,
            a: document.getElementById('answerInput').value,
            img: document.getElementById('qImage').files[0]
        });
        currentStep++;
        if(currentStep < qList.length) updateQuestion();
        else showSection('final-section');
    }

    function showSection(id) {
        ['password-section', 'theme-section', 'cover-section', 'quiz-section', 'final-section'].forEach(s => {
            document.getElementById(s).classList.add('hidden');
        });
        document.getElementById(id).classList.remove('hidden');
    }

    async function sendToTelegram() {
        const btn = document.getElementById('sendBtn');
        btn.disabled = true; btn.innerText = "Отправка...";
        let text = `📕 НОВЫЙ ЗАКАЗ: ${selectedTheme.toUpperCase()}\n👤 Авторы: ${document.getElementById('authorsInput').value}\n\n`;
        answers.forEach(it => { text += `❓ ${it.q}\n✅ ${it.a}\n\n`; });

        try {
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({chat_id: CHAT_ID, text: text})
            });
            for(let f of coverFiles) {
                const fd = new FormData();
                fd.append('chat_id', CHAT_ID); fd.append('photo', f);
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {method: 'POST', body: fd});
            }
            alert("Данные успешно отправлены!");
            location.reload();
        } catch(e) { alert("Ошибка!"); btn.disabled = false; }
    }
</script>
</body>
</html>
