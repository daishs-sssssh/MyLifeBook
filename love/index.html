<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Биздин тарых | Jeke Kitep</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        :root { --main: #800000; --gold: #d4af37; }
        body { font-family: 'Lora', serif; background: #4a0000; color: white; margin: 0; padding: 10px; display: flex; justify-content: center; min-height: 100vh; }
        .container { background: white; color: #333; padding: 25px; border-radius: 20px; width: 100%; max-width: 500px; border: 2px solid var(--gold); text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.6); box-sizing: border-box; }
        h2 { font-family: 'Playfair Display', serif; color: var(--main); line-height: 1.3; font-size: 22px; margin-bottom: 20px; }
        .btn { background: linear-gradient(45deg, var(--main), #b30000); color: white; padding: 18px; border: none; width: 100%; border-radius: 50px; margin-top: 15px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .skip-btn { background: #f0f0f0; color: #666; padding: 12px; border: none; width: 100%; border-radius: 50px; margin-top: 10px; cursor: pointer; font-size: 14px; }
        .hidden { display: none; }
        .lang-btn { background: #fdf2f2; border: 1px solid var(--main); padding: 15px; border-radius: 12px; cursor: pointer; color: var(--main); font-weight: bold; margin-bottom: 10px; width: 100%; }
        input, textarea { width: 100%; padding: 14px; margin-top: 15px; border: 1px solid #ddd; border-radius: 12px; font-family: inherit; font-size: 16px; box-sizing: border-box; }
        .cover-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; max-height: 350px; overflow-y: auto; padding: 5px; }
        .cover-option { border: 2px solid #eee; border-radius: 10px; padding: 5px; cursor: pointer; }
        .cover-option.selected { border-color: var(--main); background: #fff5f5; }
        .cover-option img { width: 100%; border-radius: 8px; height: 160px; object-fit: cover; }
    </style>
</head>
<body>

<div class="container">
    <div id="lang-section">
        <h2>Тилди тандаңыз / Выберите язык</h2>
        <button class="lang-btn" onclick="setLanguage('ky')">Кыргыз тили 🇰🇬</button>
        <button class="lang-btn" onclick="setLanguage('ru')">Русский язык 🇷🇺</button>
    </div>

    <div id="password-section" class="hidden">
        <h2 id="passTitle">Купуя код</h2>
        <input type="password" id="passInput" placeholder="Кодду жазыңыз">
        <button class="btn" onclick="checkPassword()">Кирүү</button>
    </div>

    <div id="design-section" class="hidden">
        <h2 id="designTitle">Дизайн тандаңыз</h2>
        <div class="cover-grid" id="coverGrid"></div>
        <button class="btn" onclick="showSection('author-section')">Тандадым ➡️</button>
    </div>

    <div id="author-section" class="hidden">
        <h2 id="authorTitle">Китеп кимден?</h2>
        <textarea id="authorsInput" placeholder="Мисалы: Сүйүктүү жубайыңдан"></textarea>
        <button class="btn" onclick="startQuestions()">Баштоо ➡️</button>
    </div>

    <div id="quiz-section" class="hidden">
        <div id="progressText" style="color:var(--gold); font-style:italic; font-size: 14px; margin-bottom: 5px;"></div>
        <h2 id="questionText" style="font-size: 19px; min-height: 80px; display: flex; align-items: center; justify-content: center;"></h2>
        
        <div id="textInputBlock">
            <textarea id="answerInput" rows="4" placeholder="Жообуңуз..."></textarea>
            <button class="skip-btn" onclick="skipQuestion()">Өткөрүп жиберүү (Пропустить)</button>
        </div>

        <div id="imageInputBlock" class="hidden">
            <p id="imageText" style="color: var(--main); font-weight: bold;"></p>
            <input type="file" id="photoInput" accept="image/*" style="margin: 20px 0;">
        </div>

        <button class="btn" id="nextBtn" onclick="handleNext()">Кийинки ➡️</button>
    </div>

    <div id="final-section" class="hidden">
        <h2 id="finalTitle">Баары даяр!</h2>
        <button class="btn" id="sendBtn" onclick="sendToTelegram()">Жөнөтүү 🚀</button>
    </div>
</div>

<script>
    const BOT_TOKEN = "8604545122:AAEx9ZLtB8Cwl1Juj7ue15ktZoB1UtrpBDQ";
    const CHAT_ID = "5420064941";

    let lang = 'ky';
    let selectedDesignName = "";
    let currentStep = 0;
    let answers = [];

    const questionsData = {
        ky: [
            "Сиздин эсиңизде калган эң биринчи жолугушууңуз каерде болгон?", "Аны биринчи жолу көргөндө кандай кийимде эле?", "Биринчи айткан сөзүңүздөр?", "Анын кайсы адаты сизди суктантты?", "Ким биринчи 'Сүйөм' деп айткан?", "Биринчи жолу эмнеси менен таң калтырган?", "Ким көбүрөөк толкунданды?", "Анын номерин кантип таптыңыз?", "Биринчи жолу каякка тамактанганы бардыңыздар?", "Ата-энеси менен таанышуу кандай өттү?", "Алгачкы 'учкан көпөлөктөр' качан пайда болду?", "Биринчи жолу кол кармашкан учуруңуз?", "Аны башкалардан айырмалап турган сапаты?", "Ошол күнү аба-ырайы кандай эле?", "Аны көргөндөгү эң биринчи оюңуз?",
            "Бул сиздин тагдырыңыз экенин качан сездиңиз?", "Анын күлкүсүн бир сөз менен сүрөттөңүз?", "Эң бактылуу күнүңүз?", "Анын эң күтүүсүз сюрпризи?", "Экөөңүзгө гана тиешелүү 'жашыруун сөз'?", "Анын кайсы тамагын жакшы көрөсүз?", "Бири-бириңизди эркелетип кандай атайсыздар?", "Ал жок болсо эмнени сагынасыз?", "Анын эң камкор кадамы?", "Биринчи жолу кантип табыштыңыздар?", "Анын көздөрүнөн эмнени көрөсүз?", "Сизди эң катуу күлдүргөн учуру?", "Анын кайсы ийгилиги менен сыймыктанасыз?", "Ал жашооңузда пайда болгону эмне өзгөрдү?", "Эң назик көз ирмем?"
        ],
        ru: [
            "Где было ваше первое свидание?", "Во что он/она был одет?", "Первые слова друг другу?", "Что вас очаровало?", "Кто первый признался в любви?", "Чем удивил в первый раз?", "Кто больше волновался?", "Как нашли его номер?", "Где впервые поужинали вместе?", "Знакомство с родителями?", "Первые 'бабочки' в животе?", "Первый раз за руки?", "Главное отличие от других?", "Какая была погода?", "Первая мысль о нем?",
            "Когда поняли, что это судьба?", "Опишите его смех одним словом?", "Самый счастливый день?", "Самый неожиданный сюрприз?", "Ваше секретное слово?", "Любимое блюдо в его исполнении?", "Ласковые прозвища?", "По чему скучаете, когда его нет?", "Самый заботливый поступок?", "Как помирились в первый раз?", "Что видите в его глазах?", "Момент, когда смеялись до слез?", "Каким достижением гордитесь?", "Что изменилось в вашей жизни?", "Самый нежный момент?"
        ]
    };

    function setLanguage(l) {
        lang = l;
        document.getElementById('imageText').innerText = (lang === 'ky' ? "Бул бөлүмгө сонун сүрөт кошуңуз (китепке кошобуз):" : "Добавьте красивое фото для этого раздела:");
        generateCovers();
        showSection('password-section');
    }

    function generateCovers() {
        const grid = document.getElementById('coverGrid');
        grid.innerHTML = "";
        for(let i=1; i<=10; i++) {
            grid.innerHTML += `
                <div class="cover-option" onclick="selectDesign(this, 'Дизайн ${i}')">
                    <img src="https://daishs-sssssh.github.io/MyLifeBook/cover${i}.jpg" onerror="this.src='https://via.placeholder.com/150x210?text=Design+${i}'">
                </div>`;
        }
    }

    function checkPassword() {
        if(document.getElementById('passInput').value === "1234") showSection('design-section');
        else alert("Ката код!");
    }

    function selectDesign(el, name) {
        document.querySelectorAll('.cover-option').forEach(item => item.classList.remove('selected'));
        el.classList.add('selected');
        selectedDesignName = name;
    }

    function startQuestions() { showSection('quiz-section'); updateQuestion(); }

    async function sendPhotoToTelegram(file) {
        if (!file) return;
        const btn = document.getElementById('nextBtn');
        btn.innerText = (lang === 'ky' ? "Жүктөлүүдө..." : "Загрузка...");
        btn.disabled = true;
        const formData = new FormData();
        formData.append('chat_id', CHAT_ID);
        formData.append('photo', file);
        formData.append('caption', `ФОТО: Блок ${Math.ceil((currentStep + 1) / 15)}`);
        try { await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: formData }); } catch (e) { console.error(e); }
        btn.disabled = false;
    }

    async function handleNext() {
        const textBlock = document.getElementById('textInputBlock');
        const imgBlock = document.getElementById('imageInputBlock');
        const ansInput = document.getElementById('answerInput');
        const photoInput = document.getElementById('photoInput');

        if (!imgBlock.classList.contains('hidden')) {
            if (photoInput.files[0]) await sendPhotoToTelegram(photoInput.files[0]);
            imgBlock.classList.add('hidden');
            textBlock.classList.remove('hidden');
            currentStep++;
            checkFinish();
            return;
        }
        if (ansInput.value.trim() !== "") answers.push({ q: questionsData[lang][currentStep], a: ansInput.value });
        if ((currentStep + 1) % 15 === 0) {
            textBlock.classList.add('hidden');
            imgBlock.classList.remove('hidden');
            document.getElementById('questionText').innerText = (lang === 'ky' ? "Бул бөлүмгө сүрөт кошуңуз" : "Добавьте фото");
            document.getElementById('nextBtn').innerText = (lang === 'ky' ? "Сактоо 📸" : "Сохранить 📸");
        } else {
            currentStep++;
            checkFinish();
        }
    }

    function skipQuestion() {
        answers.push({ q: questionsData[lang][currentStep], a: "---" });
        currentStep++;
        checkFinish();
    }

    function checkFinish() {
        if (currentStep < questionsData[lang].length) updateQuestion();
        else showSection('final-section');
    }

    function updateQuestion() {
        document.getElementById('progressText').innerText = `${currentStep + 1} / ${questionsData[lang].length}`;
        document.getElementById('questionText').innerText = questionsData[lang][currentStep];
        document.getElementById('answerInput').value = "";
        document.getElementById('nextBtn').innerText = (lang === 'ky' ? "Кийинки ➡️" : "Далее ➡️");
    }

    function showSection(id) {
        ['lang-section', 'password-section', 'design-section', 'author-section', 'quiz-section', 'final-section'].forEach(s => document.getElementById(s).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    async function sendToTelegram() {
        const btn = document.getElementById('sendBtn');
        btn.disabled = true;
        let text = `💍 ЖООПТОР:\n🎨 ДИЗАЙН: ${selectedDesignName}\n👤 АВТОР: ${document.getElementById('authorsInput').value}\n\n`;
        answers.forEach(it => { if(it.a !== "---") text += `❓ ${it.q}\n✅ ${it.a}\n\n`; });
        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({chat_id: CHAT_ID, text: text})
        });
        alert("Жөнөтүлдү!");
        location.reload();
    }
</script>
</body>
</html>
